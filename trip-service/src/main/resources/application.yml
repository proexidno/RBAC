server:
  port: 8082

spring:
  application:
    name: trip-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxi}
    username: ${SPRING_DATASOURCE_USERNAME:taxi}
    password: ${SPRING_DATASOURCE_PASSWORD:taxi}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

services:
  user-service-url: ${USER_SERVICE_URL:http://localhost:8081}
  notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}

taxi:
  tariff-per-km: 35.00

jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-shared-secret-for-local-dev}
  issuer: taxi-platform
  ttl-seconds: 86400

